name: Cloud Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WebViewBrowserApp.sln

    - name: Compile Optimized x64 Binary (Forced Modern Toolset)
      # We added /p:PlatformToolset=v143 to force the modern VS 2022 headers
      run: msbuild WebViewBrowserApp.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: x64/Release/
