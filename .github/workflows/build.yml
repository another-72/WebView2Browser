name: Cloud Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    # THE FIX: Lock the server to the 2022 image which has the legacy v142 components pre-installed.
    runs-on: windows-2022 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WebViewBrowserApp.sln

    - name: Compile Optimized x64 Binary
      # No toolset overrides, no installer hacks. Just a clean native build.
      run: msbuild WebViewBrowserApp.sln /p:Configuration=Release /p:Platform=x64

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: x64/Release/
