name: Cloud Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NuGet CLI
      uses: nuget/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages (Fix for C++ Win32)
      run: nuget restore WebView2Browser.sln

    - name: Compile Optimized x64 Binary
      run: msbuild WebView2Browser.sln /p:Configuration=Release /p:Platform=x64

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: x64/Release/
