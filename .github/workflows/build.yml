name: Cloud Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WebViewBrowserApp.sln

    - name: Hack the NuGet Package (Force Modern Compiler Support)
      # This intercepts the old package and rewrites its version checks from v141/v142 to v143
      run: |
        $targetFile = "packages\cpprestsdk.v141.2.10.12.1\build\native\cpprestsdk.v141.targets"
        (Get-Content $targetFile) -replace 'v141', 'v143' -replace 'v142', 'v143' | Set-Content $targetFile

    - name: Compile Optimized x64 Binary (Forced Modern v143)
      run: msbuild WebViewBrowserApp.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: Release_x64/
