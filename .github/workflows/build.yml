name: Cloud Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Missing VS 2019 ATL Component
      # This silently installs the missing headers onto the GitHub server
      run: |
        $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        $installPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
        Start-Process -FilePath $installer -ArgumentList "modify --installPath `"$installPath`" --add Microsoft.VisualStudio.Component.VC.v142.ATL --quiet --norestart" -Wait -NoNewWindow

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WebViewBrowserApp.sln

    - name: Compile Optimized x64 Binary (Native v142)
      # We removed the toolset override, letting it compile natively
      run: msbuild WebViewBrowserApp.sln /p:Configuration=Release /p:Platform=x64

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: x64/Release/
