name: Cloud Build Binary

on:
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Dependencies
      run: msbuild /t:restore WebView2Browser.sln

    - name: Compile Optimized x64 Binary
      run: msbuild WebView2Browser.sln /p:Configuration=Release /p:Platform=x64

    - name: Package Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: WebView2Browser-x64-Release
        path: x64/Release/
